<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notification Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    padding: 40px 24px;
  }
  p.label { color: #555; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

  /* PHONE FRAME */
  .phone {
    width: 380px;
    background: #111;
    border-radius: 36px;
    border: 2px solid #2a2a2a;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    padding: 14px 0 24px;
  }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2px 22px 10px;
    font-size: 11px; color: #fff; font-weight: 600;
  }
  .sb-icons { display: flex; gap: 6px; align-items: center; }

  /* NOTIFICATION SHADE */
  .shade { background: #181818; margin: 0 10px; border-radius: 20px; overflow: hidden; padding: 4px; }
  .app-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px 4px;
    font-size: 10px; color: #666; letter-spacing: .5px; text-transform: uppercase;
  }
  .app-dot { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg,#A855F7,#EC4899); }

  /* ── THE COMBINED CARD ── */
  .card {
    background: linear-gradient(140deg,#1a0020 0%,#0d000d 55%,#1a0010 100%);
    /* Option 9 shape: very rounded pill-like */
    border-radius: 18px;
    overflow: hidden;
  }

  /* Option 10: accent gradient bar on top */
  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, #A855F7, #EC4899, #F97316);
  }

  .card-body {
    padding: 12px 14px 14px;
  }

  /* Top row: icon + info */
  .top-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .icon-box {
    width: 44px; height: 44px;
    border-radius: 50%; /* pill/circle from option 9 */
    background: rgba(168,85,247,0.15);
    border: 1px solid rgba(168,85,247,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title { color: #fff; font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song-artist { color: #E879F9; font-size: 11px; margin-top: 2px; }

  /* Bottom row: Option 2 controls — Shuffle · Prev · Play · Next · Repeat · Like */
  .controls {
    display: flex; align-items: center; justify-content: space-between;
  }
  .ibtn {
    width: 34px; height: 34px;
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .ibtn svg { display: block; }
  .btn-play {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #A855F7, #EC4899);
    border: none; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 16px rgba(168,85,247,0.55);
  }
  .btn-play svg { display: block; }
</style>
</head>
<body>

<p class="label">Combined — Style 10 · Shape 9 · Controls 2</p>

<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <div class="sb-icons">
      <svg width="15" height="11" viewBox="0 0 16 12" fill="white"><rect x="0" y="3" width="3" height="9"/><rect x="4" y="2" width="3" height="10"/><rect x="8" y="0" width="3" height="12"/><rect x="12" y="0" width="3" height="12" opacity=".3"/></svg>
      <svg width="15" height="11" viewBox="0 0 16 12" fill="white"><path d="M8 2C5.2 2 2.7 3.2 1 5.1l1.5 1.5C3.8 5 5.8 4 8 4s4.2 1 5.5 2.6L15 5.1C13.3 3.2 10.8 2 8 2zm0 4c-1.7 0-3.2.7-4.3 1.8L5.2 9.3C6 8.5 6.9 8 8 8s2 .5 2.8 1.3l1.5-1.5C11.2 6.7 9.7 6 8 6zm0 4c-.6 0-1 .4-1 1s.4 1 1 1 1-.4 1-1-.4-1-1-1z"/></svg>
      <svg width="22" height="11" viewBox="0 0 22 12" fill="white"><rect x="0" y="0" width="17" height="12" rx="2" opacity=".3"/><rect x="0" y="0" width="13" height="12" rx="2"/><rect x="18" y="3" width="4" height="6" rx="2"/></svg>
    </div>
  </div>

  <div class="shade">
    <div class="app-row">
      <div class="app-dot"></div>
      BoxOfVibe · Now
    </div>

    <div class="card">
      <!-- Option 10: gradient accent bar -->
      <div class="accent-bar"></div>

      <div class="card-body">
        <!-- Top: icon + song info -->
        <div class="top-row">
          <div class="icon-box">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#E879F9">
              <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
          </div>
          <div class="song-info">
            <div class="song-title">Song Title</div>
            <div class="song-artist">Artist Name</div>
          </div>
        </div>

        <!-- Bottom: Option 2 controls -->
        <div class="controls">
          <!-- Sleep Timer -->
          <button class="ibtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <!-- Prev -->
          <button class="ibtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#C4B5FD">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
          </button>
          <!-- Play -->
          <button class="btn-play">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
          <!-- Next -->
          <button class="ibtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#C4B5FD">
              <path d="m6 18 8.5-6L6 6v12zm2.5-6 8.5 6V6z"/>
            </svg>
          </button>
          <!-- Repeat -->
          <button class="ibtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#C4B5FD">
              <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
            </svg>
          </button>
          <!-- Like -->
          <button class="ibtn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="#EC4899">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
