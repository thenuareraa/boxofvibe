<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Icon Preview</title>
  <style>
    body { background: #111; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 40px; }
    h1 { color: #fff; margin: 0; font-size: 18px; letter-spacing: 2px; }
    .row { display: flex; gap: 48px; flex-wrap: wrap; justify-content: center; align-items: flex-end; }
    .option { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .icon-wrap {
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    }
    .rounded { border-radius: 24px; }
    .label { color: #ccc; font-size: 13px; font-weight: bold; text-align: center; }
    .desc { color: #555; font-size: 11px; text-align: center; }
  </style>
</head>
<body>
  <h1>BOXOFVIBE ICON PREVIEW</h1>
  <div class="row">

    <!-- App icon size (108dp equivalent) with option E background -->
    <div class="option">
      <div class="icon-wrap rounded" style="width:108px;height:108px;background: radial-gradient(ellipse at 10% 10%, #25004a 0%, transparent 60%), radial-gradient(ellipse at 90% 10%, #3a0020 0%, transparent 60%), radial-gradient(ellipse at 90% 90%, #3a1000 0%, transparent 60%), #000000;">
        <svg width="90" height="90" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Glow -->
          <circle cx="50" cy="50" r="47" fill="url(#g1)" opacity="0.6"/>
          <!-- Rotating group -->
          <circle cx="50" cy="50" r="45" fill="url(#v1)" stroke="url(#b1)" stroke-width="1.5" stroke-opacity="0.6"/>
          <circle cx="50" cy="50" r="40" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="35" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="30" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="25" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <!-- Center label -->
          <circle cx="50" cy="50" r="18" fill="url(#l1)"/>
          <!-- Shine bar -->
          <rect x="45" y="5" width="10" height="90" rx="5" fill="url(#s1)" opacity="0.15"/>
          <!-- Center hole -->
          <circle cx="50" cy="50" r="4" fill="#1a1a1a"/>
          <defs>
            <radialGradient id="g1"><stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/><stop offset="50%" stop-color="#EC4899" stop-opacity="0.2"/><stop offset="100%" stop-color="#FB923C" stop-opacity="0"/></radialGradient>
            <radialGradient id="v1"><stop offset="0%" stop-color="#4a4a4a"/><stop offset="70%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#1a1a1a"/></radialGradient>
            <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="50%" stop-color="#EC4899"/><stop offset="100%" stop-color="#FB923C"/></linearGradient>
            <linearGradient id="l1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="50%" stop-color="#EC4899"/><stop offset="100%" stop-color="#FB923C"/></linearGradient>
            <linearGradient id="s1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity="0.7"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
          </defs>
        </svg>
      </div>
      <div class="label">App Icon</div>
      <div class="desc">108dp with bg option E</div>
    </div>

    <!-- Larger preview -->
    <div class="option">
      <div class="icon-wrap rounded" style="width:200px;height:200px;background: radial-gradient(ellipse at 10% 10%, #25004a 0%, transparent 60%), radial-gradient(ellipse at 90% 10%, #3a0020 0%, transparent 60%), radial-gradient(ellipse at 90% 90%, #3a1000 0%, transparent 60%), #000000;">
        <svg width="170" height="170" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="47" fill="url(#g2)" opacity="0.6"/>
          <circle cx="50" cy="50" r="45" fill="url(#v2)" stroke="url(#b2)" stroke-width="1.5" stroke-opacity="0.6"/>
          <circle cx="50" cy="50" r="40" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="35" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="30" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="25" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="18" fill="url(#l2)"/>
          <rect x="45" y="5" width="10" height="90" rx="5" fill="url(#s2)" opacity="0.15"/>
          <circle cx="50" cy="50" r="4" fill="#1a1a1a"/>
          <defs>
            <radialGradient id="g2"><stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/><stop offset="50%" stop-color="#EC4899" stop-opacity="0.2"/><stop offset="100%" stop-color="#FB923C" stop-opacity="0"/></radialGradient>
            <radialGradient id="v2"><stop offset="0%" stop-color="#4a4a4a"/><stop offset="70%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#1a1a1a"/></radialGradient>
            <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="50%" stop-color="#EC4899"/><stop offset="100%" stop-color="#FB923C"/></linearGradient>
            <linearGradient id="l2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="50%" stop-color="#EC4899"/><stop offset="100%" stop-color="#FB923C"/></linearGradient>
            <linearGradient id="s2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity="0.7"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
          </defs>
        </svg>
      </div>
      <div class="label">Large Preview</div>
      <div class="desc">Same icon, zoomed in</div>
    </div>

    <!-- Round version -->
    <div class="option">
      <div class="icon-wrap" style="width:200px;height:200px;border-radius:50%;background: radial-gradient(ellipse at 10% 10%, #25004a 0%, transparent 60%), radial-gradient(ellipse at 90% 10%, #3a0020 0%, transparent 60%), radial-gradient(ellipse at 90% 90%, #3a1000 0%, transparent 60%), #000000;">
        <svg width="170" height="170" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="47" fill="url(#g3)" opacity="0.6"/>
          <circle cx="50" cy="50" r="45" fill="url(#v3)" stroke="url(#b3)" stroke-width="1.5" stroke-opacity="0.6"/>
          <circle cx="50" cy="50" r="40" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="35" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="30" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="25" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
          <circle cx="50" cy="50" r="18" fill="url(#l3)"/>
          <rect x="45" y="5" width="10" height="90" rx="5" fill="url(#s3)" opacity="0.15"/>
          <circle cx="50" cy="50" r="4" fill="#1a1a1a"/>
          <defs>
            <radialGradient id="g3"><stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/><stop offset="50%" stop-color="#EC4899" stop-opacity="0.2"/><stop offset="100%" stop-color="#FB923C" stop-opacity="0"/></radialGradient>
            <radialGradient id="v3"><stop offset="0%" stop-color="#4a4a4a"/><stop offset="70%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#1a1a1a"/></radialGradient>
            <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="50%" stop-color="#EC4899"/><stop offset="100%" stop-color="#FB923C"/></linearGradient>
            <linearGradient id="l3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="50%" stop-color="#EC4899"/><stop offset="100%" stop-color="#FB923C"/></linearGradient>
            <linearGradient id="s3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity="0.7"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
          </defs>
        </svg>
      </div>
      <div class="label">Round version</div>
      <div class="desc">Circle crop (some launchers)</div>
    </div>

  </div>
</body>
</html>
