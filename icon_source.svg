<svg width="108" height="108" viewBox="0 0 108 108" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background glows -->
    <radialGradient id="bg1" cx="0" cy="0" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#25004a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="108" cy="0" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a0020" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg3" cx="108" cy="108" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3a1000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Vinyl soft glow -->
    <radialGradient id="glow" cx="54" cy="54" r="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#EC4899" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <!-- Vinyl body -->
    <radialGradient id="vinyl" cx="54" cy="54" r="33" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4a4a4a"/>
      <stop offset="70%"  stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <!-- Border ring gradient -->
    <linearGradient id="border" x1="19" y1="19" x2="89" y2="89" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="50%"  stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <!-- Center label gradient -->
    <linearGradient id="label" x1="41" y1="41" x2="67" y2="67" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="50%"  stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <!-- Shine bar gradient -->
    <linearGradient id="shine" x1="49" y1="54" x2="59" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="108" height="108" fill="#000000"/>
  <!-- Corner glows -->
  <rect width="108" height="108" fill="url(#bg1)"/>
  <rect width="108" height="108" fill="url(#bg2)"/>
  <rect width="108" height="108" fill="url(#bg3)"/>

  <!-- Soft glow behind vinyl (r=36, safe zone boundary) -->
  <circle cx="54" cy="54" r="36" fill="url(#glow)" opacity="0.6"/>

  <!-- Border ring (r=35) -->
  <circle cx="54" cy="54" r="35" fill="url(#border)" fill-opacity="0.6"/>

  <!-- Vinyl disc (r=33) -->
  <circle cx="54" cy="54" r="33" fill="url(#vinyl)"/>

  <!-- Groove rings -->
  <circle cx="54" cy="54" r="29" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
  <circle cx="54" cy="54" r="25" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
  <circle cx="54" cy="54" r="21" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>
  <circle cx="54" cy="54" r="17" fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.5"/>

  <!-- Center label (r=13) -->
  <circle cx="54" cy="54" r="13" fill="url(#label)"/>

  <!-- Shine bar -->
  <rect x="49" y="19" width="10" height="70" rx="5" fill="url(#shine)" opacity="0.15"/>

  <!-- Center hole (r=3) -->
  <circle cx="54" cy="54" r="3" fill="#1a1a1a"/>
</svg>
